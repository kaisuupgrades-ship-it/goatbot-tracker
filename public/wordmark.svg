<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 100" width="370" height="100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9500;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- "Bet" — white, heavy -->
  <text x="4" y="72"
    font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="84"
    letter-spacing="-3"
    fill="#FFFFFF">Bet</text>

  <!-- "OS" — gold gradient -->
  <text x="164" y="72"
    font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="84"
    letter-spacing="-3"
    fill="url(#goldGrad)">OS</text>

  <!-- Thin separator under wordmark -->
  <line x1="4" y1="83" x2="358" y2="83" stroke="#2A2A2A" stroke-width="1"/>

  <!-- Tagline -->
  <text x="6" y="97"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="9.5"
    letter-spacing="3.8"
    fill="#555555">AI-POWERED SPORTS INTELLIGENCE</text>
</svg>
